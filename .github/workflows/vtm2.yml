name: VTM Parallel Encode (Cached, Variables Fixed)

on:
  workflow_dispatch:
  push:

jobs:
  encode:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        video_id: [737]
    env:
      WIDTH: 3840
      HEIGHT: 2160
      FRAMERATE: 60
      FRAMES: 1
      QP: 37

    steps:
    # --------------------------------------------------
    # CHECKOUT
    # --------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # --------------------------------------------------
    # DEPENDENCIES
    # --------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          git \
          ffmpeg \
          unzip \
          python3-pip
        pip3 install huggingface_hub

    # --------------------------------------------------
    # CLONE VTM
    # --------------------------------------------------
    - name: Clone VTM
      run: |
        git clone https://github.com/tonmoyislam250/fluffy-pancake
        cd fluffy-pancake
        git submodule update --init --recursive

    # --------------------------------------------------
    # CACHE VTM BUILD
    # --------------------------------------------------
    - name: Cache VTM Umake Debug Build
      uses: actions/cache@v4
      with:
        path: |
          fluffy-pancake/bin
          fluffy-pancake/lib
        key: >
          ${{ runner.os }}-vtm-umake-debug-
          ${{ hashFiles(
            'fluffy-pancake/CMakeLists.txt',
            'fluffy-pancake/source/**',
            'fluffy-pancake/cfg/**'
          ) }}

    # --------------------------------------------------
    # BUILD ONLY IF CACHE MISS
    # --------------------------------------------------
    - name: Build VTM (Debug)
      run: |
        cd fluffy-pancake

        if [ ! -f bin/umake/gcc-11.4/x86_64/debug/EncoderApp ]; then
          echo "🔨 Cache miss → building VTM"
          mkdir -p build-debug
          cd build-debug
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          make -j$(nproc)
        else
          echo "✅ Using cached EncoderApp"
        fi

    # --------------------------------------------------
    # CACHE EXTRACTED DATASET
    # --------------------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-701-770-v1

    # --------------------------------------------------
    # DOWNLOAD & EXTRACT DATASET (Hugging Face)
    # --------------------------------------------------
    - name: Download and extract dataset (Hugging Face)
      run: |
        if [ ! -d dataset ]; then
          echo "📥 Cache miss → downloading dataset"
          mkdir -p dataset_zip
          wget https://huggingface.co/datasets/Tonmoyk983/files/resolve/main/701-770.zip \
            -O dataset_zip/701-770.zip

          mkdir -p dataset
          unzip -o dataset_zip/701-770.zip -d dataset
        else
          echo "✅ Dataset restored from cache"
        fi

    # --------------------------------------------------
    # CONVERT TO YUV (VARIABLE-SAFE)
    # --------------------------------------------------
    - name: Convert video to YUV
      run: |
        SEQ=${{ matrix.video_id }}
        WIDTH_VAL=${{ env.WIDTH }}
        HEIGHT_VAL=${{ env.HEIGHT }}
        FR_VAL=${{ env.FRAMERATE }}

        echo "Converting video $SEQ to YUV"

        mkdir -p Dataset/Inter4K/60fps/UHD/yuv

        ffmpeg -y \
          -i dataset/$SEQ.mp4 \
          -pix_fmt yuv420p \
          -s ${WIDTH_VAL}x${HEIGHT_VAL} \
          -r $FR_VAL \
          Dataset/Inter4K/60fps/UHD/yuv/$SEQ.yuv

    # --------------------------------------------------
    # ENCODE (VARIABLE-SAFE)
    # --------------------------------------------------
    - name: Encode with VTM (Debug)
      run: |
        SEQ=${{ matrix.video_id }}
        QP_VAL=${{ env.QP }}
        WIDTH_VAL=${{ env.WIDTH }}
        HEIGHT_VAL=${{ env.HEIGHT }}
        FR_VAL=${{ env.FRAMERATE }}
        FRAMES_VAL=${{ env.FRAMES }}

        echo "Encoding SEQ=$SEQ QP=$QP_VAL"

        mkdir -p Dataset/$QP_VAL/$SEQ
        cd fluffy-pancake

        ./bin/umake/gcc-11.4/x86_64/debug/EncoderApp \
          -c cfg/encoder_intra_vtm.cfg \
          -i ../Dataset/Inter4K/60fps/UHD/yuv/$SEQ.yuv \
          -b ../Dataset/$QP_VAL/$SEQ/output_QP$QP_VAL.bin \
          -o ../Dataset/$QP_VAL/$SEQ/rec_QP$QP_VAL.yuv \
          --SourceWidth=$WIDTH_VAL \
          --SourceHeight=$HEIGHT_VAL \
          --FrameRate=$FR_VAL \
          --FramesToBeEncoded=$FRAMES_VAL \
          --QP=$QP_VAL \
          --TraceFile="../Dataset/$QP_VAL/$SEQ/$SEQ.csv" \
          --TraceRule="D_BLOCK_STATISTICS_ALL:poc >=0" \
          > ../Dataset/$QP_VAL/$SEQ/log_QP$QP_VAL.txt

    # --------------------------------------------------
    # UPLOAD ARTIFACTS
    # --------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vtm-${{ matrix.video_id }}-QP${{ env.QP }}
        path: Dataset/${{ env.QP }}/${{ matrix.video_id }}
