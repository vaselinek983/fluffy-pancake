- name: Install mega-cmd
  run: |
    sudo apt update
    sudo apt install -y mega-cmd unzip

- name: Download dataset (mega-cmd login)
  env:
    MEGA_USER: ${{ secrets.MEGA_USER }}
    MEGA_PASS: ${{ secrets.MEGA_PASS }}
  run: |
    if [ ! -d dataset ]; then
      echo "📥 Downloading with mega-cmd"

      mkdir -p dataset_zip

      mega-login "$MEGA_USER" "$MEGA_PASS"

      mega-get "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" dataset_zip/

      mkdir -p dataset
      unzip -o dataset_zip/*.zip -d dataset

      mega-logout
    else
      echo "✅ Dataset restored from cache"
    fi
