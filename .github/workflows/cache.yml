name: Cache Dataset (MEGA CMD Login)

on:
  workflow_dispatch:

jobs:
  cache-dataset:
    runs-on: ubuntu-22.04

    steps:
    # ----------------------------------------
    # Install dependencies
    # ----------------------------------------
    - name: Install mega-cmd + unzip
      run: |
        sudo apt update
        sudo apt install -y mega-cmd unzip

    # ----------------------------------------
    # Restore cache
    # ----------------------------------------
    - name: Restore dataset cache
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    # Download dataset using mega-cmd (LOGIN + RETRY)
    # ----------------------------------------
    - name: Download dataset (mega-cmd)
      env:
        MEGA_USER: ${{ secrets.MEGA_USER }}
        MEGA_PASS: ${{ secrets.MEGA_PASS }}
      run: |
        if [ ! -d dataset ]; then
          echo "📥 Cache miss → downloading dataset via mega-cmd"

          mkdir -p dataset_zip

          # Login
          mega-login "$MEGA_USER" "$MEGA_PASS"

          # Retry loop (important for CI stability)
          for i in {1..5}; do
            echo "Attempt $i..."

            mega-get "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" dataset_zip/ && break

            echo "⚠️ Failed attempt $i, retrying in 2 minutes..."
            sleep 120
          done

          # Logout (cleanup session)
          mega-logout

          # Extract
          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset

        else
          echo "✅ Dataset restored from cache"
        fi
