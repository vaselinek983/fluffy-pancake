name: Original Video → Inter4K Output2 PNG Dataset → Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [814]

    env:
      FRAME_LIMIT: 0   # 0 = full video, 10 = test

    steps:

    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget

    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin
        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    - name: Set variables
      run: |
        echo "FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
        echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then
          mkdir -p dataset_zip

          megadl \
          "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" \
          --path dataset_zip

          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset
        fi

    # ----------------------------------------
    # Extract frames from original video
    # ----------------------------------------
    - name: Extract original video frames
      run: |
        mkdir -p original_frames

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          LIMIT="-frames:v $FRAME_LIMIT"
          echo "Testing with first $FRAME_LIMIT frames"
        else
          LIMIT=""
          echo "Processing full video"
        fi

        $FFMPEG -y \
          -i "$INPUT" \
          $LIMIT \
          original_frames/frame_%06d.png

    # ----------------------------------------
    # Create Output2 dataset
    # ----------------------------------------
    - name: Create Inter4K Output2 samples
      run: |
        mkdir -p Inter4K_png/Raw/Output2

        TOTAL_FRAMES=$(find original_frames -name "*.png" | wc -l)

        echo "Total frames: $TOTAL_FRAMES"

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          STRIDE=1
        else
          STRIDE=60
        fi

        for ((f=1; f+3<=TOTAL_FRAMES; f+=STRIDE)); do

          printf -v F3 "%06d" $((f+3))

          cp original_frames/frame_${F3}.png \
          Inter4K_png/Raw/Output2/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${F3}_original.png

        done

    # ----------------------------------------
    - name: Install rclone
      run: |
        curl https://rclone.org/install.sh | sudo bash

    # ----------------------------------------
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

    # ----------------------------------------
    - name: Upload dataset to Drive
      run: |
        rclone copy Inter4K_png dataset:Inter4K_png --progress
