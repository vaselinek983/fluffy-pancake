name: Original Video → Inter4K Output2 PNG Dataset → Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [201,202,203,204,205,206,207,208,209,210,211,212,213,214,215,216,217,218,219,220,221,222,223,224,225,226,227,228,229,230,231,232,233,234,235,236,237,238,239,240,241,242,243,244,245,246,247,248,249,250,251,252,253,254,255,256,257,258,259,260,261,262,263,264,265,266,267,268,269,270,271,272,273,274,275,276,277,278,279,280,281,282,283,284,285,286,287,288,289,290,291,292,293,294,295,296,297,298,299,300,301,302,303,304,305,306,307,308,309,310,311,312,313,314,315,316,317,318,319,320,321,322,323,324,325,326,327,328,329,330,331,332,333,334,335,336,337,338,339,340,341,342,343,344,345,346,347,348,349,350,351,352,353,354,355,356,357,358,359,360,361,362,363,364,365,366,367,368,369,370,371,372,373,374,375,376,377,378,379,380,381,382,383,384,385,386,387,388,389,390,391,392,393,394,395,396,397,398,399,400,401,402,403,404,405,406,407,408,409,410,411,412,413,414,415,416,417,418,419,420,421,422,423,424,425,426,427,428,429,430,431,432,433,434,435,436,437,438,439,440,441,442,443,444,445,446,447,448,449,450,451,452,453,454,455,456,457,458,459,460,461,462,463,464,465,466,467,468,469,470,471,472,473,474,475,476,477,478,479,480,481,482,483,484,485,486,487,488,489,490,491,492,493,494,495,496,497,498,499,500]

    env:
      FRAME_LIMIT: 0   # 0 = full video, 10 = test

    steps:

    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget

    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin
        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    - name: Set variables
      run: |
        echo "FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
        echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then
          mkdir -p dataset_zip

          megadl \
          "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" \
          --path dataset_zip

          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset
        fi

    # ----------------------------------------
    # Extract frames from original video
    # ----------------------------------------
    - name: Extract original video frames
      run: |
        mkdir -p original_frames

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          LIMIT="-frames:v $FRAME_LIMIT"
          echo "Testing with first $FRAME_LIMIT frames"
        else
          LIMIT=""
          echo "Processing full video"
        fi

        $FFMPEG -y \
          -i "$INPUT" \
          $LIMIT \
          original_frames/frame_%06d.png

    # ----------------------------------------
    # Create Output2 dataset
    # ----------------------------------------
    - name: Create Inter4K Output2 samples
      run: |
        mkdir -p Inter4K_png/Raw/Output2

        TOTAL_FRAMES=$(find original_frames -name "*.png" | wc -l)

        echo "Total frames: $TOTAL_FRAMES"

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          STRIDE=1
        else
          STRIDE=60
        fi

        for ((f=1; f+3<=TOTAL_FRAMES; f+=STRIDE)); do

          printf -v F3 "%06d" $((f+3))

          cp original_frames/frame_${F3}.png \
          Inter4K_png/Raw/Output2/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${F3}_original.png

        done

    # ----------------------------------------
    - name: Install rclone
      run: |
        curl https://rclone.org/install.sh | sudo bash

    # ----------------------------------------
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

    # ----------------------------------------
    - name: Upload dataset to Drive
      run: |
        rclone copy Inter4K_png dataset:Inter4K_png --progress
