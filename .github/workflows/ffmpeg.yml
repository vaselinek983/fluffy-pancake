name: FFmpeg vvenc Parallel (1-100)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [200,201,202,203,204,205,206,207,208,209,210,211,212,213,214,215,216,217,218,219,220,221,222,223,224,225,226,227,228,229,230,231,232,233,234,235,236,237,238,239,240,241,242,243,244,245,246,247,248,249,250,251,252,253,254,255,256,257,258,259,260,261,262,263,264,265,266,267,268,269,270,271,272,273,274,275,276,277,278,279,280,281,282,283,284,285,286,287,288,289,290,291,292,293,294,295,296,297,298,299,300]
    steps:
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget

    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin
        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    - name: Set variables
      run: |
        echo "FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
        echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then
          mkdir -p dataset_zip
          megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip
          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset
        fi

    # ----------------------------------------
    - name: Convert MP4 → YUV (VVENC)
      run: |
        mkdir -p output

        echo "Processing $INPUT"

        $FFMPEG -y -i "$INPUT" \
          -c:v libvvenc \
          -qp 32 \
          -pix_fmt yuv420p \
          -an \
          -f matroska - \
        | $FFMPEG -y -fflags +genpts -i - \
          -vsync 0 \
          -pix_fmt yuv420p \
          -f rawvideo \
          output/${{ matrix.VIDEO_ID }}.yuv

    # ----------------------------------------
    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        name: yuv-${{ matrix.VIDEO_ID }}
        path: output/${{ matrix.VIDEO_ID }}.yuv
