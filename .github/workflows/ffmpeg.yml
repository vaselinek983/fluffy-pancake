name: FFmpeg vvenc Pipe (Full Path, No Build)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    env:
      VIDEO_ID: 1

    steps:
    # ----------------------------------------
    # Checkout
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    # Install dependencies
    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget

    # ----------------------------------------
    # Download FFmpeg (BtbN build)
    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin

        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    # Verify FFmpeg + vvenc (FULL PATH)
    # ----------------------------------------
    - name: Verify FFmpeg
      run: |
        FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg

        $FFMPEG -hide_banner -version
        $FFMPEG -hide_banner -encoders | grep vvenc || echo "⚠️ vvenc NOT FOUND"

    # ----------------------------------------
    # Cache dataset
    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    # Download dataset (MEGA)
    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then
          echo "📥 Downloading dataset"
          mkdir -p dataset_zip

          megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" \
            --path dataset_zip

          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset
        else
          echo "✅ Using cached dataset"
        fi

    # ----------------------------------------
    # Convert using PIPE (FULL PATH)
    # ----------------------------------------
    - name: Convert MP4 → YUV (QP 32)
      run: |
        mkdir -p output

        FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg
        INPUT="dataset/${{ env.VIDEO_ID }}.mp4"

        echo "Processing $INPUT"

        $FFMPEG -y -i "$INPUT" \
          -c:v libvvenc \
          -qp 32 \
          -pix_fmt yuv420p \
          -f matroska - \
        | $FFMPEG -y -i - \
          -pix_fmt yuv420p \
          -f rawvideo \
          output/${{ env.VIDEO_ID }}.yuv

    # ----------------------------------------
    # Upload output
    # ----------------------------------------
    - name: Upload YUV
      uses: actions/upload-artifact@v4
      with:
        name: yuv-${{ env.VIDEO_ID }}
        path: output/${{ env.VIDEO_ID }}.yuv
