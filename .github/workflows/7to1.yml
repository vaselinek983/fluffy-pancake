name: VVENC → Inter4K PNG Dataset 7to1→ Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [201,202,203,204,205,206,207,208,209,210,211,212,213,214,215,216,217,218,219,220,221,222,223,224,225,226,227,228,229,230,231,232,233,234,235,236,237,238,239,240,241,242,243,244,245,246,247,248,249,250,251,252,253,254,255,256,257,258,259,260,261,262,263,264,265,266,267,268,269,270,271,272,273,274,275,276,277,278,279,280,281,282,283,284,285,286,287,288,289,290,291,292,293,294,295,296,297,298,299,300]

    env:
      WIDTH: 3840
      HEIGHT: 2160
      FPS: 30
      STRIDE: 80

    steps:

      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip xz-utils megatools wget curl

      # ----------------------------------------
      - name: Download FFmpeg
        run: |
          mkdir -p ffmpeg_bin
          cd ffmpeg_bin

          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

      # ----------------------------------------
      - name: Set variables
        run: |
          echo "FFMPEG=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
          echo "FFPROBE=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffprobe" >> $GITHUB_ENV
          echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

      # ----------------------------------------
      - name: Cache dataset
        uses: actions/cache@v4
        with:
          path: dataset
          key: dataset-mega-v1-${{ runner.os }}

      # ----------------------------------------
      - name: Download dataset
        run: |
          if [ ! -d dataset ]; then

            mkdir -p dataset_zip

            megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip

            mkdir -p dataset

            unzip -o dataset_zip/*.zip -d dataset
          fi

      # ----------------------------------------
      # VVENC encode → decode → reconstructed YUV
      # ----------------------------------------
      - name: Generate reconstructed YUV
        run: |
          set -euo pipefail

          mkdir -p output

          $FFMPEG -y \
            -i "$INPUT" \
            -c:v libvvenc \
            -qp 32 \
            -pix_fmt yuv420p \
            -an \
            -f matroska - \
          | $FFMPEG -y \
              -fflags +genpts \
              -i - \
              -vsync 0 \
              -pix_fmt yuv420p \
              -f rawvideo \
              output/${{ matrix.VIDEO_ID }}.yuv

      # ----------------------------------------
      # Create sparse Inter4K dataset
      #
      # Inputs:
      #   1-7 reconstructed frames
      #
      # Target:
      #   8th original frame
      #
      # Examples:
      #   1-7  -> 8
      #   81-87 -> 88
      #   161-167 -> 168
      # ----------------------------------------
      - name: Create sparse Inter4K PNG dataset
        run: |
          set -euo pipefail

          mkdir -p Inter4K_png/Raw/Input
          mkdir -p Inter4K_png/Raw/Output

          TOTAL_FRAMES=$($FFPROBE \
            -v error \
            -select_streams v:0 \
            -count_frames \
            -show_entries stream=nb_read_frames \
            -of csv=p=0 \
            "$INPUT")

          echo "Total frames: $TOTAL_FRAMES"

          for ((START=1; START+7<=TOTAL_FRAMES; START+=STRIDE)); do

            TARGET=$((START + 7))

            printf -v TARGET_PAD "%03d" "$TARGET"

            echo "Processing START=$START TARGET=$TARGET"

            # ----------------------------------------
            # Extract reconstructed input frames
            # ----------------------------------------
            for OFFSET in 0 1 2 3 4 5 6; do

              FRAME=$((START + OFFSET))
              INPUT_NUM=$((OFFSET + 1))
              
              # Pad the specific FRAME for this iteration
              printf -v FRAME_PAD "%03d" "$FRAME" 

              $FFMPEG -v error -y \
                -f rawvideo \
                -pix_fmt yuv420p \
                -s ${WIDTH}x${HEIGHT} \
                -framerate ${FPS} \
                -i output/${{ matrix.VIDEO_ID }}.yuv \
                -vf "select=eq(n\\,$((FRAME-1)))" \
                -frames:v 1 \
                Inter4K_png/Raw/Input/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${FRAME_PAD}_in${INPUT_NUM}.png

            done

            # ----------------------------------------
            # Extract original target frame
            # ----------------------------------------
            $FFMPEG -v error -y \
              -i "$INPUT" \
              -vf "select=eq(n\\,$((TARGET-1)))" \
              -frames:v 1 \
              Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${TARGET_PAD}_out.png

          done

      # ----------------------------------------
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # ----------------------------------------
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone

          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      # ----------------------------------------
      - name: Upload dataset to Google Drive
        run: |
          rclone copy Inter4K_png dataset:sevtone/Inter4K_png --progress
