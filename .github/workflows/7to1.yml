name: VVENC → Inter4K PNG Dataset → Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: []

    env:
      WIDTH: 3840
      HEIGHT: 2160
      FPS: 30
      STRIDE: 80

    steps:

    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget curl

    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin

        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    - name: Set variables
      run: |
        echo "FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
        echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then

          mkdir -p dataset_zip

          megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip

          mkdir -p dataset

          unzip -o dataset_zip/*.zip -d dataset
        fi

    # ----------------------------------------
    # VVENC encode → decode → reconstructed YUV
    # ----------------------------------------
    - name: Generate reconstructed YUV
      run: |
        mkdir -p output

        $FFMPEG -y \
          -i "$INPUT" \
          -c:v libvvenc \
          -qp 32 \
          -pix_fmt yuv420p \
          -an \
          -f matroska - \
        | $FFMPEG -y \
            -fflags +genpts \
            -i - \
            -vsync 0 \
            -pix_fmt yuv420p \
            -f rawvideo \
            output/${{ matrix.VIDEO_ID }}.yuv

    # ----------------------------------------
    # Create sparse Inter4K samples
    # Inputs:
    #   1 2 3 4 5 6 7 = reconstructed VVENC
    # Target:
    #   8 = original source frame
    # ----------------------------------------
    - name: Create sparse Inter4K PNG dataset
      run: |

        mkdir -p Inter4K_png/Raw/Input
        mkdir -p Inter4K_png/Raw/Output

        for START in 1 81 161 241; do

          echo "Processing sample starting at frame $START"

          # ----------------------------------------
          # Extract 7 reconstructed frames
          # ----------------------------------------
          for OFFSET in 0 1 2 3 4 5 6; do

            FRAME=$((START + OFFSET))

            printf -v PAD "%06d" $FRAME

            INPUT_NUM=$((OFFSET + 1))

            echo "Extracting reconstructed frame $FRAME"

            $FFMPEG -y \
              -f rawvideo \
              -pix_fmt yuv420p \
              -s ${WIDTH}x${HEIGHT} \
              -framerate ${FPS} \
              -i output/${{ matrix.VIDEO_ID }}.yuv \
              -vf "select=eq(n\\,$((FRAME-1)))" \
              -vframes 1 \
              Inter4K_png/Raw/Input/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${PAD}_in${INPUT_NUM}.png

          done

          # ----------------------------------------
          # Extract original frame 8
          # ----------------------------------------
          TARGET=$((START + 7))

          printf -v TARGET_PAD "%06d" $TARGET
          printf -v START_PAD "%06d" $START

          TARGET_TIME=$(awk "BEGIN {print ($TARGET-1)/${FPS}}")

          echo "Extracting original target frame $TARGET"

          $FFMPEG -y \
            -ss $TARGET_TIME \
            -i "$INPUT" \
            -vframes 1 \
            Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${START_PAD}_out.png

        done

    # ----------------------------------------
    - name: Install rclone
      run: |
        curl https://rclone.org/install.sh | sudo bash

    # ----------------------------------------
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone

        echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

    # ----------------------------------------
    - name: Upload dataset to Google Drive
      run: |
        rclone copy Inter4K_png dataset:Inter4K_png --progress
