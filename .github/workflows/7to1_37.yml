name: VVENC → Inter4K PNG Dataset 7to1_37→ Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [701,702,703,704,705,706,707,708,709,710,711,712,713,714,715,716,717,718,719,720,721,722,723,724,725,726,727,728,729,730,731,732,733,734,735,736,737,738,739,740,741,742,743,744,745,746,747,748,749,750,751,752,753,754,755,756,757,758,759,760,761,762,763,764,765,766,767,768,769,770,771,772,773,774,775,776,777,778,779,780,781,782,783,784,785,786,787,788,789,790,791,792,793,794,795,796,797,798,799,800,801,802,803,804,805,806,807,808,809,810,811,812,813,814,815,816,817,818,819,820,821,822,823,824,825,826,827,828,829,830,831,832,833,834,835,836,837,838,839,840,841,842,843,844,845,846,847,848,849,850,851,852,853,854,855,856,857,858,859,860,861,862,863,864,865,866,867,868,869,870,871,872,873,874,875,876,877,878,879,880,881,882,883,884,885,886,887,888,889,890,891,892,893,894,895,896,897,898,899,900]

    env:
      WIDTH: 3840
      HEIGHT: 2160
      FPS: 60
      STRIDE: 60

    steps:

      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip xz-utils megatools wget curl

      # ----------------------------------------
      - name: Download FFmpeg
        run: |
          mkdir -p ffmpeg_bin
          cd ffmpeg_bin

          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

      # ----------------------------------------
      - name: Set variables
        run: |
          echo "FFMPEG=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
          echo "FFPROBE=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffprobe" >> $GITHUB_ENV
          echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

      # ----------------------------------------
      - name: Cache dataset
        uses: actions/cache@v4
        with:
          path: dataset
          key: dataset-mega-v1-${{ runner.os }}

      # ----------------------------------------
      - name: Download dataset
        run: |
          if [ ! -d dataset ]; then

            mkdir -p dataset_zip

            megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip

            mkdir -p dataset

            unzip -o dataset_zip/*.zip -d dataset
          fi

      # ----------------------------------------
      # VVENC encode → decode → reconstructed YUV
      # ----------------------------------------
      - name: Generate reconstructed YUV
        run: |
          set -euo pipefail

          mkdir -p output

          $FFMPEG -y \
            -i "$INPUT" \
            -c:v libvvenc \
            -qp 47 \
            -pix_fmt yuv420p \
            -an \
            -f matroska - \
          | $FFMPEG -y \
              -fflags +genpts \
              -i - \
              -vsync 0 \
              -pix_fmt yuv420p \
              -f rawvideo \
              output/${{ matrix.VIDEO_ID }}.yuv

      # ----------------------------------------
      # Create sparse Inter4K dataset
      #
      # Inputs:
      #   1-7 reconstructed frames
      #
      # Targets:
      #   8th original frame (Target)
      #   4th original frame (Middle Original)
      #
      # Examples:
      #   1-7  -> 8 (Target) and 4 (Orig)
      #   61-67 -> 68 (Target) and 64 (Orig)
      # ----------------------------------------
      - name: Create sparse Inter4K PNG dataset
        run: |
          set -euo pipefail

          mkdir -p Inter4K_png/Raw/Input
          mkdir -p Inter4K_png/Raw/Output

          TOTAL_FRAMES=$($FFPROBE \
            -v error \
            -select_streams v:0 \
            -count_frames \
            -show_entries stream=nb_read_frames \
            -of csv=p=0 \
            "$INPUT")

          echo "Total frames: $TOTAL_FRAMES"

          for ((START=1; START+7<=TOTAL_FRAMES; START+=STRIDE)); do

            TARGET=$((START + 7))
            MIDDLE=$((START + 3))

            printf -v TARGET_PAD "%03d" "$TARGET"
            printf -v MIDDLE_PAD "%03d" "$MIDDLE"

            echo "Processing START=$START MIDDLE=$MIDDLE TARGET=$TARGET"

            # ----------------------------------------
            # Extract reconstructed input frames
            # ----------------------------------------
            for OFFSET in 0 1 2 3 4 5 6; do

              FRAME=$((START + OFFSET))
              INPUT_NUM=$((OFFSET + 1))
              
              # Pad the specific FRAME for this iteration
              printf -v FRAME_PAD "%03d" "$FRAME" 

              $FFMPEG -v error -y \
                -f rawvideo \
                -pix_fmt yuv420p \
                -s ${WIDTH}x${HEIGHT} \
                -framerate ${FPS} \
                -i output/${{ matrix.VIDEO_ID }}.yuv \
                -vf "select=eq(n\\,$((FRAME-1)))" \
                -frames:v 1 \
                Inter4K_png/Raw/Input/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${FRAME_PAD}_in${INPUT_NUM}.png

            done

            # ----------------------------------------
            # Extract original target frame (8th frame)
            # ----------------------------------------
            $FFMPEG -v error -y \
              -i "$INPUT" \
              -vf "select=eq(n\\,$((TARGET-1)))" \
              -frames:v 1 \
              Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${TARGET_PAD}_out.png

            # ----------------------------------------
            # Extract original middle frame (4th frame)
            # ----------------------------------------
            $FFMPEG -v error -y \
              -i "$INPUT" \
              -vf "select=eq(n\\,$((MIDDLE-1)))" \
              -frames:v 1 \
              Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${MIDDLE_PAD}_out.png

          done

      # ----------------------------------------
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # ----------------------------------------
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone

          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      # ----------------------------------------
      - name: Upload dataset to Google Drive
        run: |
          rclone copy Inter4K_png dataset:sevtone_47/Inter4K_png --progress
