name: VVENC → Inter4K PNG Dataset → Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [501,502,503,504,505,506,507,508,509,510,511,512,513,514,515,516,517,518,519,520,521,522,523,524,525,526,527,528,529,530,531,532,533,534,535,536,537,538,539,540,541,542,543,544,545,546,547,548,549,550,551,552,553,554,555,556,557,558,559,560,561,562,563,564,565,566,567,568,569,570,571,572,573,574,575,576,577,578,579,580,581,582,583,584,585,586,587,588,589,590,591,592,593,594,595,596,597,598,599,600]

    env:
      FRAME_LIMIT: 0   # 0 = full video, 10 = test

    steps:
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip xz-utils megatools wget

    # ----------------------------------------
    - name: Download FFmpeg
      run: |
        mkdir -p ffmpeg_bin
        cd ffmpeg_bin
        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

    # ----------------------------------------
    - name: Set variables
      run: |
        echo "FFMPEG=ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
        echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

    # ----------------------------------------
    - name: Cache dataset
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    - name: Download dataset
      run: |
        if [ ! -d dataset ]; then
          mkdir -p dataset_zip
          megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip
          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset
        fi

    # ----------------------------------------
    # VVENC encode → decode → YUV
    # ----------------------------------------
    - name: Generate reconstructed YUV
      run: |
        mkdir -p output

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          LIMIT="-frames:v $FRAME_LIMIT"
        else
          LIMIT=""
        fi

        $FFMPEG -y -i "$INPUT" \
          $LIMIT \
          -c:v libvvenc \
          -qp 32 \
          -pix_fmt yuv420p \
          -an \
          -f matroska - \
        | $FFMPEG -y -fflags +genpts -i - \
          -vsync 0 \
          $LIMIT \
          -pix_fmt yuv420p \
          -f rawvideo \
          output/${{ matrix.VIDEO_ID }}.yuv

    # ----------------------------------------
    # Convert YUV → PNG frames
    # ----------------------------------------
    - name: Convert YUV to PNG frames
      run: |
        mkdir -p frames

        WIDTH=3840
        HEIGHT=2160

        $FFMPEG -y \
          -f rawvideo -pix_fmt yuv420p -s ${WIDTH}x${HEIGHT} \
          -i output/${{ matrix.VIDEO_ID }}.yuv \
          frames/frame_%06d.png

    # ----------------------------------------
    # Generate Inter4K PNG dataset
    # ----------------------------------------
    - name: Create Inter4K PNG samples
      run: |
        mkdir -p Inter4K_png/Raw/Input
        mkdir -p Inter4K_png/Raw/Output

        TOTAL_FRAMES=$(ls frames | wc -l)

        echo "Total frames: $TOTAL_FRAMES"

        if [ "$FRAME_LIMIT" -gt 0 ]; then
          STRIDE=1
        else
          STRIDE=60
        fi

        for ((f=1; f+3<=TOTAL_FRAMES; f+=STRIDE)); do
          printf -v F0 "%06d" $f
          printf -v F1 "%06d" $((f+1))
          printf -v F2 "%06d" $((f+2))
          printf -v F3 "%06d" $((f+3))

          cp frames/frame_${F0}.png Inter4K_png/Raw/Input/Intet4K_vid_${{ matrix.VIDEO_ID }}_f${F0}_in1.png
          cp frames/frame_${F1}.png Inter4K_png/Raw/Input/Intet4K_vid_${{ matrix.VIDEO_ID }}_f${F1}_in2.png
          cp frames/frame_${F2}.png Inter4K_png/Raw/Input/Intet4K_vid_${{ matrix.VIDEO_ID }}_f${F2}_in3.png

          cp frames/frame_${F3}.png Inter4K_png/Raw/Output/Intet4K_vid_${{ matrix.VIDEO_ID }}_f${F0}_out.png
        done

    # ----------------------------------------
    - name: Install rclone
      run: |
        curl https://rclone.org/install.sh | sudo bash

    # ----------------------------------------
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

    # ----------------------------------------
    - name: Upload dataset to Drive
      run: |
        rclone copy Inter4K_png dataset:Inter4K_png --progress
